<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#0a0f0a" rx="4"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#4ade80" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="14" font-weight="600" letter-spacing="2">AUTOALLOCATOR LOOP</text>
  <line x1="280" y1="38" x2="520" y2="38" stroke="#4ade80" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Node 1: LLM Proposes Mutation -->
  <rect x="40" y="60" width="170" height="44" rx="6" fill="#0a0f0a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="125" y="78" text-anchor="middle" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10" font-weight="600">LLM Proposes</text>
  <text x="125" y="93" text-anchor="middle" fill="#4ade80" font-family="'SF Mono','Consolas',monospace" font-size="9">Mutation</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="82" x2="245" y2="82" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.7"/>
  <polygon points="245,78 253,82 245,86" fill="#4ade80" fill-opacity="0.7"/>

  <!-- Node 2: Apply Patch -->
  <rect x="255" y="60" width="170" height="44" rx="6" fill="#0a0f0a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="340" y="78" text-anchor="middle" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10" font-weight="600">Apply Patch to</text>
  <text x="340" y="93" text-anchor="middle" fill="#4ade80" font-family="'SF Mono','Consolas',monospace" font-size="9">allocator.py</text>

  <!-- Arrow 2→3 -->
  <line x1="425" y1="82" x2="460" y2="82" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.7"/>
  <polygon points="460,78 468,82 460,86" fill="#4ade80" fill-opacity="0.7"/>

  <!-- Node 3: Backtest -->
  <rect x="470" y="60" width="170" height="44" rx="6" fill="#0a0f0a" stroke="#4ade80" stroke-width="1.5"/>
  <text x="555" y="78" text-anchor="middle" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="10" font-weight="600">Backtest</text>
  <text x="555" y="93" text-anchor="middle" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" fill-opacity="0.6">(5yr historical)</text>

  <!-- Arrow 3→Diamond -->
  <line x1="555" y1="104" x2="555" y2="140" stroke="#4ade80" stroke-width="1.2" stroke-opacity="0.7"/>
  <polygon points="551,140 555,148 559,140" fill="#4ade80" fill-opacity="0.7"/>

  <!-- Diamond: Decision -->
  <polygon points="555,155 650,195 555,235 460,195" fill="#0a0f0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="555" y="190" text-anchor="middle" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" font-weight="600">Sharpe improved?</text>
  <text x="555" y="203" text-anchor="middle" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" font-weight="600">DD > -25%?</text>

  <!-- YES label -->
  <text x="380" y="195" text-anchor="middle" fill="#22c55e" font-family="'SF Mono','Consolas',monospace" font-size="10" font-weight="700">YES</text>

  <!-- Arrow Diamond→KEPT (left) -->
  <line x1="460" y1="195" x2="370" y2="195" stroke="#22c55e" stroke-width="1.2"/>
  <polygon points="370,191 362,195 370,199" fill="#22c55e"/>

  <!-- Node: git commit KEPT -->
  <rect x="200" y="175" width="160" height="40" rx="6" fill="#0a0f0a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="280" y="193" text-anchor="middle" fill="#22c55e" font-family="'SF Mono','Consolas',monospace" font-size="10" font-weight="700">git commit</text>
  <text x="280" y="207" text-anchor="middle" fill="#22c55e" font-family="'Inter','Helvetica Neue',sans-serif" font-size="8" fill-opacity="0.8">KEPT</text>

  <!-- NO label -->
  <text x="715" y="195" text-anchor="middle" fill="#ef4444" font-family="'SF Mono','Consolas',monospace" font-size="10" font-weight="700">NO</text>

  <!-- Arrow Diamond→DISCARDED (right) -->
  <line x1="650" y1="195" x2="740" y2="195" stroke="#ef4444" stroke-width="1.2"/>
  <polygon points="740,191 748,195 740,199" fill="#ef4444"/>

  <!-- Node: git revert DISCARDED -->
  <rect x="200" y="255" width="160" height="40" rx="6" fill="#0a0f0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="280" y="273" text-anchor="middle" fill="#ef4444" font-family="'SF Mono','Consolas',monospace" font-size="10" font-weight="700">git revert</text>
  <text x="280" y="287" text-anchor="middle" fill="#ef4444" font-family="'Inter','Helvetica Neue',sans-serif" font-size="8" fill-opacity="0.8">DISCARDED</text>

  <!-- Revert node (right side) -->
  <rect x="690" y="175" width="90" height="40" rx="6" fill="#0a0f0a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="735" y="193" text-anchor="middle" fill="#ef4444" font-family="'SF Mono','Consolas',monospace" font-size="9" font-weight="700">git revert</text>
  <text x="735" y="207" text-anchor="middle" fill="#ef4444" font-family="'Inter','Helvetica Neue',sans-serif" font-size="8" fill-opacity="0.8">DISCARDED</text>

  <!-- Loop arrow from KEPT back to start -->
  <line x1="200" y1="195" x2="125" y2="195" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="125" y1="195" x2="125" y2="110" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="4,3"/>
  <polygon points="121,110 125,104 129,110" fill="#22c55e" fill-opacity="0.5"/>

  <!-- Loop arrow from DISCARDED back to start -->
  <line x1="735" y1="215" x2="735" y2="330" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="735" y1="330" x2="50" y2="330" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="50" y1="330" x2="50" y2="82" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="50" y1="82" x2="40" y2="82" stroke="#ef4444" stroke-width="0" stroke-opacity="0"/>
  <polygon points="40,78 40,86 50,82" fill="none"/>
  <!-- Connect to node 1 left side -->
  <line x1="50" y1="82" x2="38" y2="82" stroke="#ef4444" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,3"/>
  <polygon points="42,78 34,82 42,86" fill="#ef4444" fill-opacity="0.4"/>

  <!-- Loop label -->
  <text x="400" y="345" text-anchor="middle" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="8" fill-opacity="0.4">CONTINUOUS LOOP</text>

  <!-- Mutation Strategies Panel -->
  <rect x="30" y="240" width="155" height="145" rx="6" fill="#0a0f0a" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="107" y="258" text-anchor="middle" fill="#4ade80" font-family="'SF Mono','Consolas',monospace" font-size="8" font-weight="600" letter-spacing="1">MUTATION STRATEGIES</text>
  <line x1="40" y1="264" x2="175" y2="264" stroke="#4ade80" stroke-opacity="0.2" stroke-width="0.5"/>

  <circle cx="47" cy="281" r="2.5" fill="#3b82f6"/>
  <text x="57" y="284" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" fill-opacity="0.8">Pair Shift</text>

  <circle cx="47" cy="299" r="2.5" fill="#8b5cf6"/>
  <text x="57" y="302" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" fill-opacity="0.8">Defensive Tilt</text>

  <circle cx="47" cy="317" r="2.5" fill="#06b6d4"/>
  <text x="57" y="320" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" fill-opacity="0.8">Growth Tilt</text>

  <circle cx="47" cy="335" r="2.5" fill="#f59e0b"/>
  <text x="57" y="338" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" fill-opacity="0.8">Random Perturbation</text>

  <circle cx="47" cy="353" r="2.5" fill="#22c55e"/>
  <text x="57" y="356" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" fill-opacity="0.8">Concentration</text>

  <circle cx="47" cy="371" r="2.5" fill="#ef4444"/>
  <text x="57" y="374" fill="#e5e5e5" font-family="'Inter','Helvetica Neue',sans-serif" font-size="9" fill-opacity="0.8">World Signal</text>

  <!-- Dashed line connecting strategies to Node 1 -->
  <line x1="107" y1="240" x2="107" y2="110" stroke="#4ade80" stroke-width="0.6" stroke-opacity="0.3" stroke-dasharray="3,4"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="399" x2="800" y2="399" stroke="#4ade80" stroke-opacity="0.08" stroke-width="0.5"/>
  <line x1="0" y1="0.5" x2="800" y2="0.5" stroke="#4ade80" stroke-opacity="0.08" stroke-width="0.5"/>
</svg>